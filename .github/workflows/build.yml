name: Build apps

# Builds the GridDown desktop apps for Linux and Windows.
# Trigger manually (Actions tab → Run workflow) or by pushing a version tag (vX.Y.Z).
#
# iOS is intentionally not built here: Apple's toolchain only runs on macOS and
# needs signing certificates + provisioning profiles. Add a macOS runner job with
# `tauri ios build` and repository secrets once those are set up.

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            triple: x86_64-unknown-linux-gnu
            pm_asset: Linux_x86_64.tar.gz
          - platform: windows-latest
            triple: x86_64-pc-windows-msvc
            pm_asset: Windows_x86_64.zip
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Provision go-pmtiles sidecar
        shell: bash
        env:
          PM_VER: "1.31.1"
        run: |
          mkdir -p src-tauri/binaries
          cd src-tauri/binaries
          url="https://github.com/protomaps/go-pmtiles/releases/download/v${PM_VER}/go-pmtiles_${PM_VER}_${{ matrix.pm_asset }}"
          if [[ "${{ matrix.platform }}" == windows-latest ]]; then
            curl -sL -o pm.zip "$url"
            unzip -o pm.zip
            mv pmtiles.exe "pmtiles-${{ matrix.triple }}.exe"
          else
            curl -sL -o pm.tgz "$url"
            tar xzf pm.tgz
            mv pmtiles "pmtiles-${{ matrix.triple }}"
            chmod +x "pmtiles-${{ matrix.triple }}"
          fi

      - name: Install frontend dependencies
        run: npm ci

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # When run on a tag, tauri-action publishes a GitHub Release with installers.
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: "GridDown ${{ github.ref_name }}"
          releaseDraft: true
