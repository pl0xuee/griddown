name: Build apps

# Builds the GridDown desktop apps for Linux and Windows.
# Trigger manually (Actions tab → Run workflow) or by pushing a version tag (vX.Y.Z).
#
# iOS is intentionally not built here: Apple's toolchain only runs on macOS and
# needs signing certificates + provisioning profiles. Add a macOS runner job with
# `tauri ios build` and repository secrets once those are set up.

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

# The default GITHUB_TOKEN is read-only, so publishing a release fails with
# "Resource not accessible by integration". Manual runs never noticed, because
# they don't create a release — only tag runs do.
permissions:
  contents: write

jobs:
  # Both suites must pass before anything is built, and — because a tag run
  # publishes — before anything is released. Previously test.yml ran alongside
  # this workflow rather than ahead of it, so a tagged push with a failing test
  # produced a red X next to a release that had already gone out.
  tests:
    uses: ./.github/workflows/test.yml

  build:
    needs: tests
    strategy:
      fail-fast: false
      matrix:
        include:
          # ubuntu-24.04, not 22.04. The AppImage bundles the whole GTK/GDK/
          # epoxy/wayland stack of whatever it was built on, and a 2022 stack
          # cannot initialise EGL against a current compositor + GPU driver —
          # v0.1.0's AppImage opened to a white window with no map on CachyOS
          # with an RX 9070, because WebGL was unavailable.
          - platform: ubuntu-24.04
            triple: x86_64-unknown-linux-gnu
          - platform: windows-latest
            triple: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v7

      # Release notes come from CHANGELOG.md, and a tagged build fails without
      # them. v0.1.5 shipped with a completely empty release body — the page was
      # a list of files and nothing else — and nothing anywhere noticed. An
      # empty release still "succeeds", so the only way this stays fixed is for
      # a missing section to stop the build.
      #
      # Runs before anything expensive, and explicitly under bash so the
      # Windows leg of the matrix does not get PowerShell.
      - name: Read the release notes for this tag
        id: notes
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          version="${GITHUB_REF_NAME}"
          # Everything between this version's heading and the next one.
          body=$(awk -v v="## $version" '
            $0 == v {found=1; next}
            found && /^## v/ {exit}
            found {print}
          ' CHANGELOG.md)

          if [ -z "$(printf '%s' "$body" | tr -d '[:space:]')" ]; then
            echo "::error::CHANGELOG.md has no '## $version' section — add one before tagging"
            exit 1
          fi

          # Multi-line values need the delimiter form; a bare assignment keeps
          # only the first line.
          {
            echo "body<<GRIDDOWN_NOTES_EOF"
            printf '%s\n' "$body"
            echo "GRIDDOWN_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"
          echo "release notes: $(printf '%s' "$body" | wc -l) lines"

      - uses: actions/setup-node@v7
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          # 24.04 renamed libappindicator3-dev to the ayatana package.
          # desktop-file-utils: pinned appimagetool 1.9.0 requires
          # desktop-file-validate, which the "continuous" build did not.
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf desktop-file-utils

      # The go-pmtiles sidecar used to be downloaded here and bundled as an
      # externalBin. It's gone: extracting a state from the Protomaps planet
      # build now happens in-process (src-tauri/src/pmtiles_extract.rs), because
      # iOS forbids spawning subprocesses. That also takes 57 MB off every
      # desktop build.

      - name: Install frontend dependencies
        run: npm ci

      - name: Build the app
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signs the updater artifacts. Without these the build still succeeds
          # but produces no latest.json, so nothing can auto-update.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # When run on a tag, tauri-action publishes a GitHub Release with installers.
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: "GridDown ${{ github.ref_name }}"
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: true

      # The AppImage bundles libwayland-* and libepoxy from the build machine.
      # Those talk to the HOST compositor and GPU driver, so a bundled 2022/2024
      # copy fails to initialise EGL on a current rolling distro: v0.1.0 opened
      # to a white window with no map on CachyOS + RX 9070, because WebGL was
      # never available. Verified locally that deleting exactly these libs, so
      # the host's own copies get used, fixes it.
      #
      # Repackaging changes the bytes, so the signature tauri-action produced no
      # longer matches — the AppImage must be re-signed or the updater would
      # reject it.
      - name: Use the host graphics stack in the AppImage
        if: startsWith(matrix.platform, 'ubuntu')
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPIMAGETOOL_SHA256: "46fdd785094c7f6e545b61afcfb0f3d98d8eab243f644b4b17698c01d06083d1"
        run: |
          set -euo pipefail
          cd src-tauri/target/release/bundle/appimage
          APP=$(ls *.AppImage)
          ./"$APP" --appimage-extract >/dev/null
          rm -f squashfs-root/usr/lib/libwayland-*.so* squashfs-root/usr/lib/libepoxy.so*
          # Pinned, not "continuous": this tool repackages the AppImage that we
          # then sign with our own key, so a retagged or compromised upstream
          # build would be signed as legitimate and auto-installed by every
          # Linux user. Verify the checksum before trusting it.
          curl -sLo appimagetool https://github.com/AppImage/appimagetool/releases/download/1.9.0/appimagetool-x86_64.AppImage
          echo "$APPIMAGETOOL_SHA256  appimagetool" | sha256sum -c -
          chmod +x appimagetool
          rm -f "$APP" "$APP.sig"
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run squashfs-root "$APP"
          rm -rf squashfs-root appimagetool
          cd "$GITHUB_WORKSPACE"
          # No -f/-p flags: the CLI already reads TAURI_SIGNING_PRIVATE_KEY and
          # TAURI_SIGNING_PRIVATE_KEY_PASSWORD from the environment, and passing
          # a key path as well is rejected as a conflicting argument.
          npx tauri signer sign "src-tauri/target/release/bundle/appimage/$APP"
          echo "APPIMAGE_NAME=$APP" >> "$GITHUB_ENV"

      # tauri-action already uploaded the pre-fix AppImage (and a latest.json
      # naming its old signature) when this run is for a tag. Replace both, or
      # every Linux user downloads the broken one and no update verifies.
      - name: Replace the released AppImage with the fixed one
        if: startsWith(matrix.platform, 'ubuntu') && github.ref_type == 'tag'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          D=src-tauri/target/release/bundle/appimage
          gh release upload "${{ github.ref_name }}" \
            "$D/$APPIMAGE_NAME" "$D/$APPIMAGE_NAME.sig" --clobber
          NEWSIG=$(cat "$D/$APPIMAGE_NAME.sig")
          gh release download "${{ github.ref_name }}" -p latest.json -D /tmp --clobber
          jq --arg sig "$NEWSIG" '.platforms |= with_entries(
                if (.key | startswith("linux-"))
                   and ((.value.url // "") | ascii_downcase | test("appimage"))
                then .value.signature = $sig else . end)' \
            /tmp/latest.json > /tmp/latest.fixed.json
          mv /tmp/latest.fixed.json /tmp/latest.json
          gh release upload "${{ github.ref_name }}" /tmp/latest.json --clobber

      # tauri-action only publishes installers when run on a tag. Manual runs
      # built them and threw them away, which made "test the real build" a
      # dead end — upload them so any run produces something downloadable.
      - name: Upload installers
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: griddown-${{ matrix.triple }}
          retention-days: 14
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/**/*.sig
            src-tauri/target/release/bundle/**/latest.json
