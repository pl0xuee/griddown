name: iOS build check

# Compiles the app for iOS on a macOS runner.
#
# The point is to catch iOS-only breakage without owning a Mac. Apple's
# toolchain only runs on macOS, and this repo is public, so macOS runners are
# free — there is no reason not to know whether the iOS build compiles.
#
# Deliberately NOT a release build: producing an installable .ipa needs an
# Apple Developer account, certificates and a provisioning profile. A simulator
# build needs none of that and still compiles every line of Rust, Swift and
# Objective-C the device build would.

on:
  workflow_dispatch:
  push:
    branches: ["**"]
    paths:
      - "src-tauri/**"
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ios.yml"

jobs:
  ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios, aarch64-apple-ios-sim

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      # The cheapest, sharpest check: type-check the whole Rust crate against
      # the real iOS target. This is what catches cfg mistakes — plugins gated
      # on debug_assertions instead of target OS, desktop-only APIs, crates that
      # don't cross-compile — without any Xcode involvement.
      - name: Check Rust compiles for iOS
        working-directory: src-tauri
        run: cargo check --target aarch64-apple-ios --release

      - name: Build frontend
        run: npm run build

      # Generates src-tauri/gen/apple (Xcode project, Info.plist, entitlements).
      # Also the first real test of Info.ios.plist, which is merged in here.
      - name: Generate the Xcode project
        run: npm run tauri ios init
        env:
          CI: true

      # Must go through the Tauri CLI, not raw xcodebuild. The generated Xcode
      # project has a build phase that shells back into `tauri ios xcode-script`
      # and expects the CLI to have set up its environment; invoking xcodebuild
      # directly fails looking for a dev-server address file that only exists
      # under `tauri ios dev`.
      #
      # A simulator target is what keeps this free of an Apple Developer
      # account — no certificate, no provisioning profile, no signing — while
      # still compiling every line of Rust, Swift and Objective-C.
      - name: Build for the iOS simulator
        run: npm run tauri ios build -- --target aarch64-sim
        env:
          CI: true

      # After the build, not before: Info.ios.plist is merged in as part of the
      # build, so dumping this at init time shows the bare template and proves
      # nothing.
      - name: Check Info.ios.plist was merged
        if: always()
        run: |
          echo "every Info.plist under gen/apple:"
          find src-tauri/gen/apple -name 'Info.plist'

          # Check the plist inside the built .app, not whatever `find | head -1`
          # returns first. There are several Info.plists under gen/apple —
          # including binary ones belonging to storyboard nibs, which contain
          # none of these keys — and the filesystem order among them changes
          # when a directory is renamed. This assertion passed by luck until the
          # crate rename shuffled that order.
          #
          # The built bundle is also the honest thing to check: it is the plist
          # iOS actually reads, with $(PRODUCT_NAME) and friends expanded.
          merged=$(find src-tauri/gen/apple/build -path '*.app/Info.plist' 2>/dev/null || true)
          if [ "$(printf '%s' "$merged" | grep -c .)" -ne 1 ]; then
            echo "::error::expected exactly one built .app/Info.plist, got: $merged"
            exit 1
          fi
          echo "--- $merged ---"
          plutil -p "$merged"

          # PlistBuddy rather than grep throughout: these files are binary, and
          # a substring match would also happily accept an unexpanded
          # $(PRODUCT_NAME) as if it were a real value.
          plget() { /usr/libexec/PlistBuddy -c "Print :$1" "$merged" 2>/dev/null || true; }

          # iOS terminates the app rather than denying the permission when one
          # of these is missing, so their absence is a build failure, not a
          # warning to notice later.
          for key in NSLocationWhenInUseUsageDescription \
                     NSLocalNetworkUsageDescription \
                     NSMotionUsageDescription; do
            if [ -z "$(plget "$key")" ]; then
              echo "::error::$key missing from the built Info.plist — Info.ios.plist was not merged"
              exit 1
            fi
          done
          echo "all usage strings present"

          # The display name fails differently from the usage strings: the key
          # survives but the value reverts to $(PRODUCT_NAME), which Tauri
          # derives from the Cargo package name. That ships an app called
          # "griddown" on the home screen and nothing errors. So check the
          # value, not the key.
          for key in CFBundleDisplayName CFBundleName; do
            got=$(plget "$key")
            if [ "$got" != "GridDown" ]; then
              echo "::error::$key is '$got', expected 'GridDown' — the app would ship under the wrong name"
              exit 1
            fi
          done
          echo "display name is GridDown"
