name: Tests

# Runs both test suites on every push.
#
# Until now nothing did. The suites existed and passed locally, but no workflow
# ran them, so "the tests pass" only ever meant "they passed on the machine of
# whoever last thought to run them" — and a push that broke one would sail
# through build.yml and ios.yml, both of which only ever compiled the code.
#
# Deliberately separate from build.yml: those jobs produce installers and take
# minutes, while this answers "is anything broken?" in well under one. Keeping
# it apart means the answer arrives early rather than behind a bundling step.

on:
  # Called by build.yml and ios-testflight.yml, which gate their releases on
  # this passing. Defined once and reused rather than copied into each: three
  # copies of a test job drift, and the copy that drifts is the one guarding
  # the release.
  workflow_call:
  workflow_dispatch:
  push:
    branches: ["**"]
    paths:
      - "src/**"
      - "src-tauri/**"
      - "tests/**"
      - "package.json"
      - "package-lock.json"
      - "vitest.config.ts"
      - "tsconfig.json"
      - ".github/workflows/test.yml"

jobs:
  # Split from the Rust job rather than run as a second step, so a failure in
  # the apt install below cannot stop the frontend suite from reporting. They
  # share nothing and run in parallel, so two jobs is also the faster answer.
  frontend:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      # Type errors are a broken build, not a lint opinion: `npm run build`
      # runs tsc before vite, so anything caught here would fail the release
      # later anyway — better to hear it in seconds than after a bundle.
      - name: Type-check
        run: npx tsc --noEmit

      - name: Run the frontend tests
        run: npm test

  rust:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # The lib links against Tauri, which links against webkit2gtk, so the
      # crate does not compile on a bare runner even to run a pure-logic test.
      # Same list as build.yml minus the packaging-only tools.
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      # --lib because the tests all live in the library; the second binary
      # (build-pack) has none, and building it here would only add time.
      #
      # The tests that reach the network or extract a whole state are marked
      # #[ignore] and stay skipped — this job must not depend on Protomaps
      # being up to give a verdict on a code change.
      - name: Run the Rust tests
        working-directory: src-tauri
        run: cargo test --lib
